server {
  listen 80;
  listen [::]:80;
  server_name __SERVER_NAME__;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name __SERVER_NAME__;

  ssl_certificate __TLS_CERT_FILE__;
  ssl_certificate_key __TLS_KEY_FILE__;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 10m;
  ssl_prefer_server_ciphers off;

  ssl_client_certificate __TLS_CA_FILE__;
  ssl_verify_client optional;

  location / {
    proxy_pass https://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_request_buffering off;

    proxy_ssl_server_name on;
    proxy_ssl_name __SERVER_NAME__;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate __TLS_CA_FILE__;
    proxy_ssl_certificate __TLS_CERT_FILE__;
    proxy_ssl_certificate_key __TLS_KEY_FILE__;
  }
}

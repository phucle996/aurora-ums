name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - ".github/workflows/release.yml"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Trivy scan (source code)
        uses: aquasecurity/trivy-action@0.34.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: .
          skip-files: .github/workflows/release.yml,**/*.md,Dockerfile.dev,**/Dockerfile.dev
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          vuln-type: os,library

      - name: Build binaries
        env:
          APP_NAME: aurora-ums-service
        run: |
          set -Eeuo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}_linux_amd64" ./cmd/server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}_linux_arm64" ./cmd/server

          tar -C dist -czf "dist/${APP_NAME}_linux_amd64.tar.gz" "${APP_NAME}_linux_amd64"
          tar -C dist -czf "dist/${APP_NAME}_linux_arm64.tar.gz" "${APP_NAME}_linux_arm64"

      - name: Resolve release version
        id: version
        run: |
          set -Eeuo pipefail
          hardcoded_version="$(sed -n 's/^.*HardcodedVersion[[:space:]]*string[[:space:]]*=[[:space:]]*"\([^"]\+\)".*$/\1/p' internal/config/config.go | head -n 1)"

          if [ -n "${hardcoded_version}" ]; then
            version="${hardcoded_version}"
          else
            ts="$(date -u +%Y%m%d%H%M%S)"
            seed="${ts}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA}"
            rand="$(printf '%s' "${seed}" | shasum -a 256 | cut -c1-8)"
            version="v${ts}-${rand}-alpha"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build installer bundles
        env:
          APP_NAME: aurora-ums-service
          MODULE_NAME: aurora-ums
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -Eeuo pipefail

          for arch in amd64 arm64; do
            bundle_root="dist/bundle_${arch}"
            rm -rf "${bundle_root}"
            mkdir -p "${bundle_root}/bin" "${bundle_root}/systemd" "${bundle_root}/nginx"

            install -m 0755 "dist/${APP_NAME}_linux_${arch}" "${bundle_root}/bin/${APP_NAME}"
            install -m 0644 install/aurora-ums.service.tpl "${bundle_root}/systemd/aurora-ums.service.tpl"
            install -m 0644 install/nginx.conf.tpl "${bundle_root}/nginx/aurora-ums.conf.tpl"
            sed "s|__VERSION__|${VERSION}|g" install/manifest.json > "${bundle_root}/manifest.json"

            tar -C "${bundle_root}" -czf "dist/${MODULE_NAME}_linux_${arch}_bundle.tar.gz" .
          done

          shasum -a 256 dist/*.tar.gz > dist/checksums.txt

      - name: Delete existing release/tag (overwrite mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          tag="${{ steps.version.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" -y --cleanup-tag || true
          fi
          git push origin ":refs/tags/$tag" || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Aurora UMS ${{ steps.version.outputs.value }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
